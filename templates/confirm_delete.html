{% extends "base.html" %}
{% block title %}Confirm Delete — CraftGhana{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="card shadow-sm border-0 rounded-3 mx-auto text-center p-5" style="max-width:500px;">
    <h2 class="mb-3" style="font-family:'Playfair Display',serif;">Confirm Delete</h2>
    <p class="text-muted mb-1">Are you sure you want to delete this {{ entity }}?</p>
    <p class="fw-bold fs-5 mb-4">{{ name }}</p>

    <form method="post" class="d-flex gap-2 justify-content-center">
      <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, Delete</button>
      <a href="{{ request.referrer or url_for('home') }}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
