{% extends "base.html" %}
{% block title %}Reset Password — CraftGhana{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:560px;">
  <h1 class="mb-4" style="font-family:'Playfair Display',serif;">Reset Password</h1>
  <p class="text-muted">Resetting password for <strong>{{ user.full_name }}</strong></p>

  <form method="POST" class="card shadow-sm border-0 rounded-3 p-4">
    <div class="mb-3">
      <label class="form-label fw-medium">New Password</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <div class="mb-4">
      <label class="form-label fw-medium">Confirm Password</label>
      <input type="password" name="confirm_password" class="form-control" required>
    </div>
    <div class="d-flex gap-2">
      <button type="submit" class="btn btn-custom flex-fill">Reset Password</button>
      <a href="{{ url_for('admin') }}" class="btn btn-outline-secondary flex-fill">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
