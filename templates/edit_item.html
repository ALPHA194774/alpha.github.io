{% extends "base.html" %}
{% block title %}Edit Item — CraftGhana{% endblock %}

{% block content %}
<div class="container py-4" style="max-width:640px;">
  <h1 class="text-center mb-4" style="font-family:'Playfair Display',serif;">Edit Item</h1>

  <form method="post" enctype="multipart/form-data" class="card shadow-sm border-0 rounded-3 p-4">
    <div class="mb-3">
      <label class="form-label fw-medium">Title</label>
      <input type="text" name="title" class="form-control" value="{{ item.title }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-medium">Description</label>
      <textarea name="description" class="form-control" rows="4" required>{{ item.description }}</textarea>
    </div>
    <div class="row g-3 mb-3">
      <div class="col-sm-6">
        <label class="form-label fw-medium">Price (₵)</label>
        <input type="number" step="0.01" name="price" class="form-control" value="{{ item.price }}" required>
      </div>
      <div class="col-sm-6">
        <label class="form-label fw-medium">Quantity</label>
        <input type="number" name="quantity" class="form-control" value="{{ item.quantity }}" required>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-medium">Category</label>
      <input type="text" name="category" class="form-control" value="{{ item.category }}" required>
    </div>
    <div class="mb-3">
      <label class="form-label fw-medium">Current Image</label>
      <div>
        {% if item.image_filename %}
          <img src="{{ url_for('uploads', filename=item.image_filename) }}" alt="{{ item.title }}" class="rounded-2 mb-2" style="max-width:150px;height:auto;">
        {% else %}
          <p class="text-muted small">No image uploaded.</p>
        {% endif %}
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-medium">Change Image <small class="text-muted">(optional)</small></label>
      <input type="file" name="image" class="form-control">
    </div>
    <div class="d-grid">
      <button type="submit" class="btn btn-custom btn-lg">Update Item</button>
    </div>
  </form>
</div>
{% endblock %}
