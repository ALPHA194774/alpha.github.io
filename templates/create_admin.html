{% extends "base.html" %}
{% block title %}Create Admin — CraftGhana{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <h2>Create Admin Account</h2>
    <p class="text-muted text-center mb-4">This page is available only until the first admin is created.</p>

    <form method="POST">
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" name="full_name" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" required>
      </div>
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" name="password_confirm" class="form-control" required>
      </div>
      <div class="d-grid mt-4">
        <button type="submit" class="btn btn-primary btn-lg">Create Admin</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
